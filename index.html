<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Service</title>
    <!-- daisy ui and tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- css link -->
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- fav icon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
  </head>
  <body>
    <header class="max-w-[1920px] mx-auto">
      <!-- Nav bar -->
      <nav class="">
        <div class="flex justify-between items-center p-5">
          <div class="flex justify-center items-center gap-2">
            <img src="./assets/logo.png" alt="" class="w-12" />
            <p class="font-extrabold text-xl text-[#006747]">
              Emergency <br />
              Service
            </p>
          </div>
          <div class="space-x-4">
            <button class="btn rounded-2xl bg-[#ecfff0] font-black text-base">
              <span id="heart-beat">0</span>❤️
            </button>
            <button class="btn rounded-2xl bg-[#ecfff0] font-black text-base">
              <span id="call-coin">100</span>🪙
            </button>
            <button class="btn rounded-2xl bg-[#00a63ef2] text-white text-lg">
              <span>2</span> Copy
            </button>
          </div>
        </div>
      </nav>

      <!-- Banner -->

      <div
        class="flex flex-col justify-center items-center bg-linear-to-r from-[#013827] via-[#006243] to-[#013827] space-y-5 p-5"
      >
        <img src="./assets/logo.png" alt="" class="w-25" />
        <h2 class="font-semibold text-4xl text-white">জরুরি সেবা ডিরেক্টরি</h2>
        <p class="font-semibold text-xl text-white">
          Government Emergency Services at Your Fingertip A Project by
          Government of the Peoples Republic of Bangladesh
        </p>
      </div>
    </header>

    <main class="bg-[#f5fff6] max-w-[1920px] mx-auto my-10">
      <!-- Cart section -->
      <section class="grid grid-cols-12 gap-4 w-11/12 mx-auto p-5 mt-5">
        <section class="col-span-9">
          <div class="cart-container gap-5 grid grid-cols-3">
            <!-- cart 1 -->
            <div class="cart-div bg-white rounded-md shadow-lg">
              <!-- cart icon -->
              <div class="flex justify-between items-center p-5">
                <p class="bg-[#ffe3e1] rounded-xl w-10 p-2">
                  <img src="./assets/emergency.png" alt="" />
                </p>
                <p class="heart"><i class="fa-regular fa-heart"></i></p>
              </div>
              <!-- cart details -->
              <div class="space-y-2 p-5">
                <h2 class="font-bold text-2xl">জাতীয় জরুরি সেবা</h2>
                <p class="cart-sub-title font-medium text-lg text-[#5c5c5c]">
                  National Emergency
                </p>
                <h2 class="emergency-number font-bold text-2xl mt-6">999</h2>
                <button
                  class="bg-[#f2f2f2] font-medium text-lg text-[#5c5c5c] rounded-xl p-2"
                >
                  সার্বজনীন
                </button>
              </div>
              <!-- btn -->
              <div class="flex justify-between items-center p-5">
                <button
                  class="border-1 rounded-lg border-gray-400 text-[#5c5c5c] text-xl px-8 py-4"
                >
                  <span><i class="fa-regular fa-copy"></i></span> Copy
                </button>
                <button
                  class="call-btn btn rounded-2xl bg-[#00a63ef2] text-white text-lg px-8 py-8"
                >
                  <span><i class="fa-solid fa-phone"></i></span> Call
                </button>
              </div>
            </div>
            <!-- cart 2 -->
            <div class="cart-div bg-white rounded-md shadow-lg">
              <!-- cart icon -->
              <div class="flex justify-between items-center p-5">
                <p class="bg-[#ffe3e1] rounded-xl w-10 p-2">
                  <img src="./assets/police.png" alt="" />
                </p>
                <p class="heart"><i class="fa-regular fa-heart"></i></p>
              </div>
              <!-- cart details -->
              <div class="space-y-2 p-5">
                <h2 class="font-bold text-2xl">পুলিশ</h2>
                <p class="font-medium text-lg text-[#5c5c5c]">Police</p>
                <h2 class="font-bold text-2xl mt-6">999</h2>
                <button
                  class="bg-[#f2f2f2] font-medium text-lg text-[#5c5c5c] rounded-xl p-2"
                >
                  পুলিশ
                </button>
              </div>
              <!-- btn -->
              <div class="flex justify-between items-center p-5">
                <button
                  class="border-1 rounded-lg border-gray-400 text-[#5c5c5c] text-xl px-8 py-4"
                >
                  <span><i class="fa-regular fa-copy"></i></span> Copy
                </button>
                <button
                  class="call-btn btn rounded-2xl bg-[#00a63ef2] text-white text-lg px-8 py-8"
                >
                  <span><i class="fa-solid fa-phone"></i></span> Call
                </button>
              </div>
            </div>
          </div>
        </section>
        <aside class="bg-white col-span-3">
          <!-- Call history -->
          <div class="p-2">
            <div class="flex justify-between items-center p-5">
              <p class=" ">
                <i class="fa-regular fa-clock"></i
                ><span class="font-bold text-xl ml-2">Call History</span>
              </p>

              <button id="clear-btn"
                class="btn rounded-4xl bg-[#00a63ef2] text-white text-lg px-10 py-8"
              >
                Clear
              </button>
            </div>

            <div id="call-history-container" class="">
              
            </div>
          </div>
        </aside>
      </section>
    </main>
    <script src="./index.js"></script>
  </body>
</html>
